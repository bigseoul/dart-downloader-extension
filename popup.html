<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>jsDATAlab DART 다운로더</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>

  <!-- M3 Small Top App Bar -->
  <header class="app-bar">
    <span class="app-bar-title">jsDATAlab DART 다운로더 : AI 입력용</span>
    <span class="app-bar-subtitle" id="docTitle"></span>
  </header>

  <!-- Toolbar: tree selection + expand/collapse controls -->
  <div class="toolbar" role="toolbar" aria-label="트리 컨트롤">
    <div class="toolbar-start">
      <button class="chip chip--filled" id="btnSelectAll" title="전체 선택">전체 선택</button>
      <button class="chip chip--outlined" id="btnDeselectAll" title="선택 해제">선택 해제</button>
    </div>
    <div class="toolbar-end">
      <button class="icon-btn" id="btnExpandAll" title="모두 펼치기" aria-label="모두 펼치기">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round" aria-hidden="true">
          <polyline points="6,7 12,12 18,7" />
          <polyline points="6,12 12,17 18,12" />
        </svg>
      </button>
      <button class="icon-btn" id="btnCollapseAll" title="모두 접기" aria-label="모두 접기">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round" aria-hidden="true">
          <polyline points="6,17 12,12 18,17" />
          <polyline points="6,12 12,7 18,12" />
        </svg>
      </button>
    </div>
  </div>

  <!-- Loading state -->
  <div id="loading" class="state-loading">
    <div class="spinner" role="progressbar" aria-label="로딩 중"></div>
    <span>목차를 불러오는 중...</span>
  </div>

  <!-- Error state -->
  <div id="error" class="state-error" style="display:none;" role="alert"></div>

  <!-- Tree -->
  <div id="treeContainer" class="tree-scroll" style="display:none;" role="tree"></div>

  <!-- Bottom action bar -->
  <div class="bottom-bar">
    <label class="switch-wrap" title="HTML 형식으로 다운로드">
      <input type="checkbox" id="chkDownloadHtml" class="switch-input">
      <span class="switch-track" aria-hidden="true"></span>
      <span class="switch-label-text">HTML</span>
    </label>
    <button class="btn-filled" id="btnDownload" disabled>
      다운로드&nbsp;<span id="selectedCount">0</span>건
    </button>
  </div>

  <!-- M3 Progress dialog (scrim + dialog) -->
  <div id="progressOverlay" class="scrim" style="display:none;" role="dialog" aria-modal="true" aria-label="다운로드 진행">
    <div class="dialog">
      <p class="dialog-headline">다운로드 중...</p>
      <div class="linear-track">
        <div class="linear-bar" id="progressBar"></div>
      </div>
      <p class="dialog-supporting" id="progressText">0 / 0</p>
    </div>
  </div>

  <script src="lib/jszip.min.js"></script>
  <script src="html_converter.js"></script>
  <script src="popup.js"></script>
</body>

</html>
